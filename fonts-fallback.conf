<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Hebrew font fallback configuration.
  When a document requests "David" and the original Microsoft font
  is not installed, substitute "David CLM" from Culmus.
  If the real David.ttf IS present in /usr/local/share/fonts/custom/,
  fontconfig will prefer it automatically.
-->
<fontconfig>
  <alias>
    <family>David</family>
    <prefer>
      <family>David CLM</family>
      <family>David</family>
    </prefer>
  </alias>
  <alias>
    <family>david</family>
    <prefer>
      <family>David CLM</family>
      <family>David</family>
    </prefer>
  </alias>
  <!-- Ensure Hebrew shaping works well -->
  <match target="font">
    <test name="lang" compare="contains">
      <string>he</string>
    </test>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>
</fontconfig>
